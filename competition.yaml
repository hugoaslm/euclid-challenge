version: 2
title: "Dying galaxies : Predicting Star Formation Shutdown with Euclid"
description: "A Master 2 Astrophysics & Machine Learning challenge. Predict the probability of massive galaxies being 'Quenched' across cosmic time, overcoming severe class imbalance and redshift-induced domain shift."
image: logo.png
registration_auto_approve: False

terms: pages/terms.md
pages:
  - title: Overview & Context
    file: pages/overview.md
  - title: Data & Physics
    file: pages/data.md
  - title: Evaluation Metrics
    file: pages/evaluation.md
  - title: Starting Kit & Baselines
    file: pages/starting_kit.md
  - title: Terms & Conditions
    file: pages/terms.md

tasks:
  - index: 0
    name: Developement Task
    description: 'Evaluate models on the public test set (1.2 <= z < 1.5). Focus on handling imbalanced classes.'
    input_data: dev_phase/input_data/
    reference_data: dev_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/
  - index: 1
    name: Final ranking
    description: 'Evaluate models on the private test set (1.5 <= z <= 2.5). Focus on Domain Adaptation at high redshift.'
    input_data: final_phase/input_data/
    reference_data: final_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/

solutions:
  - index: 0
    tasks:
      - 0
      - 1
    path: solution/

phases:
  - name: Development Phase (Public)
    description: 'Submit your predictions on the public test set to climb the leaderboard. Fine-tune your probabilities!'
    start: 01-01-2026
    end: 02-08-2026
    tasks:
      - 0
  - name: Final Phase (Private)
    description: 'Final evaluation on the hidden private test set. The Domain Shift is maximal here. Who will survive the Redshift Drift?'
    start: 02-09-2026
    end: 03-08-2026
    tasks:
      - 1

leaderboards:
  - title: Main Leaderboard
    key: main
    columns:
      - title: Redshift-Macro Log Loss
        key: logloss
        index: 0
        sorting: asc
      - title: AUPRC
        key: auprc
        index: 1
        sorting: desc
      - title: Recall @ 80% Purity
        key: recall80
        index: 2
        sorting: desc
      - title: Execution Time (s)
        key: duration
        index: 3
        sorting: asc